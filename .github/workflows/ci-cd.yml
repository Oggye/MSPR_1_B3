name: ObRail CI/CD

on:
  push:
    branches:
      - main

jobs:

  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd platform/server
          pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=." >> $GITHUB_ENV

      - name: Run tests
        run: |
          cd platform/server
          pytest -v

  frontend-tests:
    runs-on: ubuntu-latest
    continue-on-error: true 

    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' 
          cache-dependency-path: platform/front/package-lock.json

      - name: Install dependencies
        run: |
          cd platform/front
          npm install

      - name: Run tests
        run: |
          cd platform/front
          npm run test



  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Flake8 - Linter Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flake8
        run: pip install flake8

      - name: Run Flake8
        run: |
          cd platform/server
          flake8 app/ --max-line-length=120 --ignore=E501,W503 --count
        continue-on-error: true  # ← ne bloque pas si warnings

      # ESLint - Linter JavaScript
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install ESLint dependencies
        run: |
          cd platform/front
          npm install

      - name: Run ESLint
        run: |
          cd platform/front
          npx eslint src/ --ext .js,.jsx --max-warnings=50
        continue-on-error: true  

       # Prettier - Vérification format
      - name: Run Prettier
        run: |
          cd platform/front
          npx prettier --check src/
        continue-on-error: true

        

  docker-build:
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    
    if: always() && needs.backend-tests.result == 'success'
    
    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build



  docker-push:
    needs: [docker-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push images
        run: |
          docker compose build
          docker tag mspr_1_b3-front ghcr.io/oggye/obrail-front:latest
          docker tag mspr_1_b3-api ghcr.io/oggye/obrail-api:latest
          docker tag mspr_1_b3-etl ghcr.io/oggye/obrail-etl:latest
          docker push ghcr.io/oggye/obrail-front:latest
          docker push ghcr.io/oggye/obrail-api:latest
          docker push ghcr.io/oggye/obrail-etl:latest
