name: ObRail CI/CD

on:
  push:
    branches:
      - main

jobs:

  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd platform/server
          pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=." >> $GITHUB_ENV

      - name: Run tests
        run: |
          cd platform/server
          pytest -v

  frontend-tests:
    runs-on: ubuntu-latest
    continue-on-error: true 

    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' 
          cache-dependency-path: platform/front/package-lock.json

      - name: Install dependencies
        run: |
          cd platform/front
          npm install

      - name: Run tests
        run: |
          cd platform/front
          npm run test

  docker-build:
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    
    if: always() && needs.backend-tests.result == 'success'
    
    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
