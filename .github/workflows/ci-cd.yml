name: ObRail CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true


jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r platform/server/requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=." >> $GITHUB_ENV

      - name: Run unit tests
        run: python -m pytest -v platform/server/test/unit

      - name: Run integration tests
        run: python -m pytest -v platform/server/test/integration/api_db

      - name: Run E2E tests
        run: python -m pytest -v platform/server/test/E2E

        

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    needs: [backend-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: platform/front/app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: platform/front/app

      - name: Run tests
        run: CI=true npm test -- --watch=false --passWithNoTests
        working-directory: platform/front/app

      - name: Build frontend
        run: npm run build
        working-directory: platform/front/app

      # E2E Playwright
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: platform/front/app

      - name: Start docker services for E2E
        run: docker compose up -d db api front prometheus grafana loki promtail

      - name: Wait for frontend and API
        run: |
          for i in {1..60}; do
            curl -fsS http://localhost:3000/externe/HomePage >/dev/null && curl -fsS http://localhost:8000/health >/dev/null && exit 0
            sleep 5
          done
          echo "Services not ready in time"
          docker compose ps
          docker compose logs --tail=200
          exit 1

      - name: Run Playwright E2E
        run: npm run e2e
        working-directory: platform/front/app

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: platform/front/app/playwright-report
          if-no-files-found: ignore

      - name: Stop docker services
        if: always()
        run: docker compose down -v
        


  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Flake8
        run: |
          pip install flake8
          flake8 platform/server/app --max-line-length=120 --ignore=E501,W503 --count
        continue-on-error: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: platform/front/app/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: platform/front/app

      - name: Run ESLint
        run: npx eslint src --ext .js,.jsx --max-warnings=50
        working-directory: platform/front/app
        continue-on-error: true

      - name: Run Prettier
        run: npx prettier --check src
        working-directory: platform/front/app
        continue-on-error: true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, code-quality]
    if: always() && needs.backend-tests.result == 'success' && needs.frontend-tests.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

  docker-push:
    name: Docker Push to GHCR
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        run: |
          set -euo pipefail
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHA="${{ github.sha }}"
          
          # Find images
          FRONT_ID=$(docker image ls -q mspr_1_b3-front | head -1)
          API_ID=$(docker image ls -q mspr_1_b3-api | head -1)
          ETL_ID=$(docker image ls -q mspr_1_b3-etl | head -1)
          
          if [ -z "$FRONT_ID" ] || [ -z "$API_ID" ] || [ -z "$ETL_ID" ]; then
            echo "ERROR: Image not found"
            docker image ls
            exit 1
          fi
          
          # Tag images
          docker tag $FRONT_ID ghcr.io/$OWNER/mspr_1_b3-front:latest
          docker tag $API_ID ghcr.io/$OWNER/mspr_1_b3-api:latest
          docker tag $ETL_ID ghcr.io/$OWNER/mspr_1_b3-etl:latest
          
          # Push
          docker push ghcr.io/$OWNER/mspr_1_b3-front:latest
          docker push ghcr.io/$OWNER/mspr_1_b3-api:latest
          docker push ghcr.io/$OWNER/mspr_1_b3-etl:latest
