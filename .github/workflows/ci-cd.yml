name: ObRail CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend - Unit / Integration / E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r platform/server/requirements.txt

      - name: Run unit tests
        run: python -m pytest -q platform/server/test/unit

      - name: Run integration tests
        run: python -m pytest -q platform/server/test/integration/api_db

      - name: Run backend E2E tests
        run: python -m pytest -q platform/server/test/E2E

  frontend-tests:
    name: Frontend - Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: platform/front/app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: platform/front/app

      - name: Run frontend tests
        run: CI=true npm test -- --watch=false --passWithNoTests
        working-directory: platform/front/app

      - name: Build frontend app (testable admin artifact)
        run: npm run build
        working-directory: platform/front/app

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-interface-build
          path: platform/front/app/build
          if-no-files-found: error

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          flake8 platform/server/app --max-line-length=120 --ignore=E501,W503 --count
        continue-on-error: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: platform/front/app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: platform/front/app

      - name: Run ESLint
        run: npx eslint src --ext .js,.jsx --max-warnings=50
        working-directory: platform/front/app
        continue-on-error: true

      - name: Run Prettier check
        run: npx prettier --check src
        working-directory: platform/front/app
        continue-on-error: true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, code-quality]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

  deploy-testable-admin:
    name: Local Testable Deployment (Admin)
    runs-on: ubuntu-latest
    needs: [docker-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start local test stack
        run: |
          set -euo pipefail
          docker compose up -d db
          docker compose up -d --no-deps api front

      - name: Wait for API health endpoint
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          docker compose logs api --tail=80
          exit 1

      - name: Validate admin interface route
        run: |
          set -euo pipefail
          curl -fsS http://localhost:3000/interne/HomePage > /dev/null
          echo "Admin interface is reachable"

      - name: Show running containers
        run: docker compose ps

      - name: Stop stack
        if: always()
        run: docker compose down -v

  docker-push:
    name: Docker Push to GHCR
    runs-on: ubuntu-latest
    needs: [deploy-testable-admin]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push images
        run: |
          set -euo pipefail
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          SHA_TAG="${GITHUB_SHA}"

          FRONT_IMAGE_ID="$(docker image ls -q obrail-front:latest)"
          API_IMAGE_ID="$(docker image ls -q obrail-api:latest)"
          ETL_IMAGE_ID="$(docker image ls -q obrail-etl:latest)"

          if [ -z "${FRONT_IMAGE_ID}" ] || [ -z "${API_IMAGE_ID}" ] || [ -z "${ETL_IMAGE_ID}" ]; then
            echo "One or more image IDs are missing"
            exit 1
          fi

          docker tag "${FRONT_IMAGE_ID}" "ghcr.io/${OWNER_LC}/obrail-front:${SHA_TAG}"
          docker tag "${API_IMAGE_ID}" "ghcr.io/${OWNER_LC}/obrail-api:${SHA_TAG}"
          docker tag "${ETL_IMAGE_ID}" "ghcr.io/${OWNER_LC}/obrail-etl:${SHA_TAG}"
          docker tag "${FRONT_IMAGE_ID}" "ghcr.io/${OWNER_LC}/obrail-front:latest"
          docker tag "${API_IMAGE_ID}" "ghcr.io/${OWNER_LC}/obrail-api:latest"
          docker tag "${ETL_IMAGE_ID}" "ghcr.io/${OWNER_LC}/obrail-etl:latest"

          docker push "ghcr.io/${OWNER_LC}/obrail-front:${SHA_TAG}"
          docker push "ghcr.io/${OWNER_LC}/obrail-api:${SHA_TAG}"
          docker push "ghcr.io/${OWNER_LC}/obrail-etl:${SHA_TAG}"
          docker push "ghcr.io/${OWNER_LC}/obrail-front:latest"
          docker push "ghcr.io/${OWNER_LC}/obrail-api:latest"
          docker push "ghcr.io/${OWNER_LC}/obrail-etl:latest"
